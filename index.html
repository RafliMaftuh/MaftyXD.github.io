<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MaftyXD Verse — Links</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Space+Grotesk:wght@500;600;700&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0b14;
    --bg-2: #0f1120;
    --surface: rgba(255, 255, 255, 0.03);
    --surface-hover: rgba(255, 255, 255, 0.06);
    --border: rgba(255, 255, 255, 0.08);
    --border-hover: rgba(255, 255, 255, 0.18);
    --text: #e8ecf1;
    --text-dim: #8a92a6;
    --text-mute: #5c6478;
    --accent: #7c9cff;
  }

  html, body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* Background layers */
  .bg-layer {
    position: fixed;
    inset: 0;
    z-index: -2;
    background:
      radial-gradient(ellipse 80% 60% at 50% 0%, rgba(124, 156, 255, 0.12), transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 100%, rgba(139, 92, 246, 0.08), transparent 60%),
      radial-gradient(ellipse 50% 40% at 10% 80%, rgba(45, 212, 191, 0.06), transparent 60%),
      var(--bg);
  }

  .bg-mesh {
    position: fixed;
    inset: 0;
    z-index: -1;
    background-image: url('https://image.qwenlm.ai/public_source/211ff9f4-92b9-42bb-9fc2-169a553b17b3/1a733c499-d318-498e-8410-f4a6096db5a3.png');
    background-size: cover;
    background-position: center;
    opacity: 0.25;
    mix-blend-mode: screen;
    filter: blur(20px) saturate(1.2);
    animation: meshDrift 20s ease-in-out infinite alternate;
  }

  @keyframes meshDrift {
    0% { transform: scale(1.1) translate(0, 0); }
    100% { transform: scale(1.15) translate(-2%, -2%); }
  }

  .noise {
    position: fixed;
    inset: 0;
    z-index: -1;
    opacity: 0.04;
    pointer-events: none;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  }

  .container {
    max-width: 580px;
    margin: 0 auto;
    padding: 80px 24px 80px;
    position: relative;
  }

  /* Header (simple) */
  .header {
    text-align: center;
    margin-bottom: 48px;
    animation: fadeUp 0.8s ease both;
  }

  .header .brand {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 6px 14px;
    background: rgba(124, 156, 255, 0.08);
    border: 1px solid rgba(124, 156, 255, 0.18);
    border-radius: 999px;
    font-size: 0.75rem;
    font-weight: 500;
    color: var(--accent);
    letter-spacing: 0.04em;
    margin-bottom: 20px;
  }

  .header .brand .dot {
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--accent);
    box-shadow: 0 0 10px var(--accent);
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .header h1 {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 2.4rem;
    font-weight: 700;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #ffffff 0%, #a5b4fc 100%);
    -webkit-background-clip: text;
    background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 10px;
  }

  .header .tagline {
    font-size: 0.95rem;
    color: var(--text-dim);
    font-weight: 400;
  }

  /* List */
  .list {
    display: flex;
    flex-direction: column;
    gap: 12px;
    animation: fadeUp 0.8s ease 0.15s both;
  }

  /* Card */
  .card {
    position: relative;
    display: flex;
    align-items: center;
    gap: 18px;
    padding: 20px 24px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px;
    cursor: pointer;
    text-decoration: none;
    color: inherit;
    overflow: hidden;
    transition: all 0.35s cubic-bezier(0.2, 0.8, 0.2, 1);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
  }

  .card::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(500px circle at var(--mx, 50%) var(--my, 50%), rgba(124, 156, 255, 0.08), transparent 40%);
    opacity: 0;
    transition: opacity 0.4s;
    pointer-events: none;
  }

  .card:hover::before { opacity: 1; }

  .card:hover {
    transform: translateY(-2px);
    border-color: var(--border-hover);
    background: var(--surface-hover);
  }

  .card:active {
    transform: translateY(0);
  }

  .card.featured {
    background: linear-gradient(135deg, rgba(88, 101, 242, 0.15), rgba(88, 101, 242, 0.05));
    border-color: rgba(88, 101, 242, 0.3);
  }

  .card.featured:hover {
    border-color: rgba(88, 101, 242, 0.5);
    background: linear-gradient(135deg, rgba(88, 101, 242, 0.22), rgba(88, 101, 242, 0.08));
  }

  .icon-box {
    flex-shrink: 0;
    width: 48px;
    height: 48px;
    border-radius: 12px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(255, 255, 255, 0.06);
    transition: transform 0.3s ease;
  }

  .card:hover .icon-box {
    transform: scale(1.05);
  }

  .icon-box svg {
    width: 22px;
    height: 22px;
  }

  .card.featured .icon-box {
    background: rgba(88, 101, 242, 0.2);
    border-color: rgba(88, 101, 242, 0.35);
  }

  .card-text {
    flex: 1;
    min-width: 0;
  }

  .card-title {
    font-size: 1rem;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin-bottom: 3px;
    color: var(--text);
  }

  .card-sub {
    font-size: 0.82rem;
    color: var(--text-mute);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .card-arrow {
    flex-shrink: 0;
    width: 20px;
    height: 20px;
    color: var(--text-mute);
    transition: all 0.3s ease;
  }

  .card:hover .card-arrow {
    color: var(--text);
    transform: translateX(4px);
  }

  /* Footer */
  .footer {
    text-align: center;
    margin-top: 56px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    font-size: 0.8rem;
    color: var(--text-mute);
    animation: fadeUp 0.8s ease 0.3s both;
  }

  .footer .heart {
    color: #ef4444;
    display: inline-block;
    animation: beat 1.4s ease-in-out infinite;
  }

  @keyframes beat {
    0%, 100% { transform: scale(1); }
    50% { transform: scale(1.2); }
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Ripple */
  .ripple {
    position: absolute;
    border-radius: 50%;
    background: rgba(255, 255, 255, 0.15);
    transform: scale(0);
    animation: rippleAnim 0.6s ease-out;
    pointer-events: none;
  }

  @keyframes rippleAnim {
    to { transform: scale(4); opacity: 0; }
  }

  @media (max-width: 480px) {
    .container { padding: 60px 18px 60px; }
    .header h1 { font-size: 1.9rem; }
    .card { padding: 18px 20px; gap: 14px; }
    .icon-box { width: 44px; height: 44px; }
  }
</style>
</head>
<body>
  <div class="bg-layer"></div>
  <div class="bg-mesh"></div>
  <div class="noise"></div>

  <div class="container">
    <!-- Simple Header -->
    <div class="header">
      <div class="brand">
      <h1>MaftyXD Verse</h1>
      <p class="tagline"></p>
    </div>

    <!-- List -->
    <div class="list" id="list">
      <!-- Cards injected by JS -->
    </div>

    <div class="footer">
      by MaftyXD · © 2026
    </div>
  </div>

<script>
  const links = [
    {
      title: 'Discord',
      sub: 'Community',
      url: 'https://discord.gg/SRQJKgkS4C',
      featured: true,
      color: '#5865F2',
      icon: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.37a19.79 19.79 0 0 0-4.885-1.515.074.074 0 0 0-.079.037c-.21.375-.444.864-.608 1.25a18.27 18.27 0 0 0-5.487 0 12.64 12.64 0 0 0-.617-1.25.077.077 0 0 0-.079-.037A19.736 19.736 0 0 0 3.677 4.37a.07.07 0 0 0-.032.027C.533 9.046-.32 13.58.099 18.057a.082.082 0 0 0 .031.057 19.9 19.9 0 0 0 5.993 3.03.078.078 0 0 0 .084-.028 14.09 14.09 0 0 0 1.226-1.994.076.076 0 0 0-.041-.106 13.107 13.107 0 0 1-1.872-.892.077.077 0 0 1-.008-.128 10.2 10.2 0 0 0 .372-.292.074.074 0 0 1 .077-.01c3.928 1.793 8.18 1.793 12.062 0a.074.074 0 0 1 .078.01c.12.098.246.198.373.292a.077.077 0 0 1-.006.127 12.299 12.299 0 0 1-1.873.892.077.077 0 0 0-.041.107c.36.698.772 1.362 1.225 1.993a.076.076 0 0 0 .084.028 19.84 19.84 0 0 0 6.002-3.03.077.077 0 0 0 .032-.054c.5-5.177-.838-9.674-3.549-13.66a.061.061 0 0 0-.031-.03zM8.02 15.33c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.956-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.956 2.418-2.157 2.418zm7.975 0c-1.183 0-2.157-1.085-2.157-2.419 0-1.333.955-2.419 2.157-2.419 1.21 0 2.176 1.096 2.157 2.42 0 1.333-.946 2.418-2.157 2.418z"/></svg>`
    },
    {
      title: 'TikTok',
      sub: 'Account',
      url: 'https://tiktok.com/@maftyxd',
      color: '#FF0050',
      icon: `<svg viewBox="0 0 24 24" fill="currentColor"><path d="M19.59 6.69a4.83 4.83 0 0 1-3.77-4.25V2h-3.45v13.67a2.89 2.89 0 0 1-5.2 1.74 2.89 2.89 0 0 1 2.31-4.64 2.93 2.93 0 0 1 .88.13V9.4a6.84 6.84 0 0 0-1-.05A6.33 6.33 0 0 0 5 20.1a6.34 6.34 0 0 0 10.86-4.43v-7a8.16 8.16 0 0 0 4.77 1.52v-3.4a4.85 4.85 0 0 1-1-.1z"/></svg>`
    },
    {
      title: 'Private Server',
      sub: 'Fisch',
      url: 'https://www.roblox.com/share?code=3d61ad453c7ed34a9d58c17148d3cd42&type=Server',
      color: '#a78bfa',
      icon: `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/><path d="m9 12 2 2 4-4"/></svg>`
    }
  ];

  const list = document.getElementById('list');

  links.forEach((link, i) => {
    const a = document.createElement('a');
    a.className = 'card' + (link.featured ? ' featured' : '');
    a.href = link.url;
    a.target = '_blank';
    a.rel = 'noopener noreferrer';
    a.style.animationDelay = `${0.15 + i * 0.06}s`;
    a.innerHTML = `
      <div class="icon-box" style="color: ${link.color}">
        ${link.icon}
      </div>
      <div class="card-text">
        <div class="card-title">${link.title}</div>
        <div class="card-sub">${link.sub}</div>
      </div>
      <svg class="card-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <line x1="5" y1="12" x2="19" y2="12"/>
        <polyline points="12 5 19 12 12 19"/>
      </svg>
    `;

    // Cursor-follow glow
    a.addEventListener('mousemove', (e) => {
      const rect = a.getBoundingClientRect();
      a.style.setProperty('--mx', `${e.clientX - rect.left}px`);
      a.style.setProperty('--my', `${e.clientY - rect.top}px`);
    });

    // Ripple on click
    a.addEventListener('click', (e) => {
      const rect = a.getBoundingClientRect();
      const ripple = document.createElement('span');
      ripple.className = 'ripple';
      const size = Math.max(rect.width, rect.height);
      ripple.style.width = ripple.style.height = size + 'px';
      ripple.style.left = (e.clientX - rect.left - size / 2) + 'px';
      ripple.style.top = (e.clientY - rect.top - size / 2) + 'px';
      a.appendChild(ripple);
      setTimeout(() => ripple.remove(), 600);
    });

    list.appendChild(a);
  });
</script>
</body>
</html>
